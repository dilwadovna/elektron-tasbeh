<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektron Tasbeh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tasbeh-container">
        <h1>Tasbeh</h1>
        
        <div class="display">
            <span id="counter">0</span>
        </div>

        <button class="btn-large" id="add-btn">+</button>

        <div class="sub-controls">
            <button class="btn-small" id="minus-btn">-</button>
            <button class="btn-small" id="reset-btn">Reset</button>
        </div>
        
        <p id="status-msg"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
