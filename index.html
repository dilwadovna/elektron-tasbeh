<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektron Tasbeh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Elektron Tasbeh</h1>
        <p id="count">0</p>

        <div class="buttons">
            <button class="btn increase" onclick="increaseCount()">+</button>
            <button class="btn decrease" onclick="decreaseCount()">-</button>
        </div>

        <div class="controls">
            <button onclick="resetCount()">Reset</button>
           
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
